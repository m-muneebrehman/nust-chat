<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUST FAQ Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 92%;
            max-width: 780px;
            height: 92vh;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e8eaf0;
        }

        .chat-header {
            padding: 22px 28px;
            background: #ffffff;
            border-bottom: 1px solid #f0f2f5;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 42px;
            height: 42px;
            background: #eef0ff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 20px;
            height: 20px;
            color: #5a5fcf;
        }

        .header-text h1 {
            font-size: 1rem;
            font-weight: 600;
            color: #1a1c2e;
            letter-spacing: -0.01em;
        }

        .header-text p {
            font-size: 0.75rem;
            color: #8b8fa8;
            margin-top: 1px;
            font-weight: 400;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .chat-messages {
            flex: 1;
            padding: 24px 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #fafbff;
        }

        .message-wrap {
            display: flex;
            flex-direction: column;
            gap: 3px;
            animation: slideUp 0.25s ease-out;
        }

        .message-wrap.user {
            align-items: flex-end;
        }

        .message-wrap.bot {
            align-items: flex-start;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message {
            max-width: 68%;
            padding: 11px 16px;
            font-size: 0.875rem;
            line-height: 1.55;
            word-wrap: break-word;
            font-weight: 400;
        }

        .user .message {
            background: #5a5fcf;
            color: #ffffff;
            border-radius: 16px 16px 4px 16px;
        }

        .bot .message {
            background: #ffffff;
            color: #2d2f45;
            border-radius: 16px 16px 16px 4px;
            border: 1px solid #eceef5;
        }

        .sender-label {
            font-size: 0.7rem;
            color: #adb0c4;
            font-weight: 500;
            padding: 0 4px;
            letter-spacing: 0.02em;
        }

        .chat-input-area {
            padding: 16px 24px 20px;
            background: #ffffff;
            border-top: 1px solid #f0f2f5;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f6fb;
            border-radius: 14px;
            padding: 6px 6px 6px 16px;
            border: 1.5px solid transparent;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #c5c7ee;
            background: #ffffff;
        }

        .input-wrapper input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            font-size: 0.875rem;
            color: #2d2f45;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            padding: 6px 0;
        }

        .input-wrapper input::placeholder {
            color: #b0b3c6;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            background: #5a5fcf;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #4a4fbf;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #d6d8ea;
            cursor: not-allowed;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            color: #ffffff;
        }

        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #eceef5;
            border-radius: 16px 16px 16px 4px;
            width: fit-content;
            animation: slideUp 0.25s ease-out;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #c5c7ee;
            border-radius: 50%;
            animation: pulse 1.3s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.18s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.36s; }

        @keyframes pulse {
            0%, 60%, 100% { transform: scale(0.7); opacity: 0.4; }
            30% { transform: scale(1); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e0e2ef; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #c8cae0; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
                </svg>
            </div>
            <div class="header-text">
                <h1>NUST FAQ Assistant</h1>
                <p><span class="status-dot"></span>Online · Admissions & Programs</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message-wrap bot">
                <span class="sender-label">Assistant</span>
                <div class="message">Hi there! I'm your NUST admissions assistant. Ask me anything about admissions, fees, eligibility, or programs.</div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask about admissions, fees, programs…" autofocus>
                <button class="send-btn" id="sendBtn" aria-label="Send">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser) {
            const wrap = document.createElement('div');
            wrap.className = `message-wrap ${isUser ? 'user' : 'bot'}`;

            const label = document.createElement('span');
            label.className = 'sender-label';
            label.textContent = isUser ? 'You' : 'Assistant';

            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;

            wrap.appendChild(label);
            wrap.appendChild(msg);
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const dots = document.createElement('div');
            dots.id = 'typingIndicator';
            dots.className = 'typing-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';
            chatMessages.appendChild(dots);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendQuestion() {
            const question = userInput.value.trim();
            if (!question) return;

            sendBtn.disabled = true;
            userInput.disabled = true;

            addMessage(question, true);
            userInput.value = '';
            showTyping();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const data = await response.json();
                hideTyping();
                addMessage(data.answer, false);
            } catch (error) {
                hideTyping();
                addMessage('Something went wrong. Please try again.', false);
            } finally {
                sendBtn.disabled = false;
                userInput.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendQuestion);
        userInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendQuestion();
        });
    </script>
</body>
</html>
